project:
  name: pluto

dev:
  args: [pnpm, run, dev]
  router:
    mode: portless
    name: pluto

logs:
  dir: logs/project-toolkit

workspace:
  baseFile: .project-toolkit/base.code-workspace

shared:
  # Share gitignored files from the main repo into generated worktrees.
  # source/target default to path when omitted.
  # include/exclude match worktree names.
  - path: .env
